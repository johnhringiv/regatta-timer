name: Android

on:
  pull_request:
  push:
    branches: [main]

jobs:
  version-check:
    # Dependabot action bumps don't ship in the APK — no version bump required.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enforce version bump vs ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1

          pr_vc=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
          pr_vn=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "PR:   versionCode=$pr_vc versionName=$pr_vn"

          if ! base=$(git show "origin/${{ github.base_ref }}:app/build.gradle.kts" 2>/dev/null); then
            echo "Base branch has no app/build.gradle.kts — first merge, skipping checks."
            exit 0
          fi
          base_vc=$(grep -oP 'versionCode = \K\d+' <<<"$base")
          base_vn=$(grep -oP 'versionName = "\K[^"]+' <<<"$base")
          echo "Base: versionCode=$base_vc versionName=$base_vn"

          if [ "$pr_vc" -le "$base_vc" ]; then
            echo "::error::versionCode must be bumped on every branch change ($pr_vc <= $base_vc)"
            exit 1
          fi
          if [ "$pr_vn" = "$base_vn" ]; then
            echo "::error::versionName must be bumped once per PR to ${{ github.base_ref }} (still $pr_vn)"
            exit 1
          fi
          echo "Version bump OK."

  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_B64 != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Restore release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > release.jks
          {
            echo "storeFile=release.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=regatta"
            echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}"
          } > keystore.properties

      - name: Build and test
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: RegattaTimer-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload R8 mapping artifact
        uses: actions/upload-artifact@v7
        with:
          name: r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: RegattaTimer-apk

      - uses: actions/download-artifact@v8
        with:
          name: r8-mapping

      - name: Create GitHub release with APK + mapping
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          vn=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          vc=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
          mv app-release.apk "RegattaTimer-v${vn}.apk"
          # mapping.txt deobfuscates crash traces from this exact build (R8 renames
          # differ per compile); open source, so publishing it costs nothing.
          mv mapping.txt "mapping-v${vn}.txt"
          gh release create "v${vn}" "RegattaTimer-v${vn}.apk" "mapping-v${vn}.txt" \
            --title "Regatta Timer v${vn}" \
            --notes "versionCode ${vc}. Sideload: see README." \
            || echo "Release v${vn} already exists; skipping."
